name: Generate Contribution Snake

on:
  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"

permissions:
  contents: write

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate:
    name: Generate and publish contribution snake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate light and dark snake animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%237C3AED&color_dots=%23EBEDF0,%23DDD6FE,%23C4B5FD,%238B5CF6,%236D28D9
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23C084FC&color_dots=%2309090B,%2317131F,%233B1764,%237C3AED,%23C084FC
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated files
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/github-contribution-grid-snake.svg
          test -f dist/github-contribution-grid-snake-dark.svg

          echo "Snake files generated successfully:"
          ls -lah dist

      - name: Publish animations to output branch
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p /tmp/snake-output

          cp dist/github-contribution-grid-snake.svg /tmp/snake-output/
          cp dist/github-contribution-grid-snake-dark.svg /tmp/snake-output/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan output

          git rm -rf . >/dev/null 2>&1 || true

          find . \
            -mindepth 1 \
            -maxdepth 1 \
            ! -name ".git" \
            -exec rm -rf {} +

          cp /tmp/snake-output/github-contribution-grid-snake.svg .
          cp /tmp/snake-output/github-contribution-grid-snake-dark.svg .

          touch .nojekyll

          git add \
            github-contribution-grid-snake.svg \
            github-contribution-grid-snake-dark.svg \
            .nojekyll

          git commit -m "chore: update contribution snake"

          git push --force origin output

      - name: Confirm publication
        shell: bash
        run: |
          echo "Contribution snake published successfully."
          echo "Branch: output"
          echo "Light SVG: github-contribution-grid-snake.svg"
          echo "Dark SVG: github-contribution-grid-snake-dark.svg"
