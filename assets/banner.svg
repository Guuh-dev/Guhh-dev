<svg
  width="1200"
  height="380"
  viewBox="0 0 1200 380"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="380">
      <stop stop-color="#050507"/>
      <stop offset="0.42" stop-color="#0C0714"/>
      <stop offset="0.72" stop-color="#24103A"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>

    <linearGradient id="purple" x1="120" y1="80" x2="1040" y2="300">
      <stop stop-color="#C084FC"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>

    <linearGradient id="softPurple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E9D5FF"/>
      <stop offset="1" stop-color="#A855F7"/>
