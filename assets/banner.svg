    <radialGradient id="glow">
      <stop stop-color="#A855F7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path
        d="M 38 0 L 0 0 0 38"
        fill="none"
        stroke="#A855F7"
        stroke-opacity="0.075"
        stroke-width="1"
      />
    </pattern>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <filter id="purpleGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="380" rx="34" fill="url(#background)"/>
  <rect width="1200" height="380" rx="34" fill="url(#grid)"/>

  <ellipse cx="1010" cy="90" rx="300" ry="240" fill="url(#glow)"/>
  <ellipse cx="180" cy="360" rx="340" ry="210" fill="url(#glow)" opacity="0.45"/>

  <path
